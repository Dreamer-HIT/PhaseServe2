<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">PhaseServe overview</title>
  <desc id="desc">Overview of PhaseServe as an online pressure-budget loop added to a prefill/decode-disaggregated serving runtime.</desc>
  <defs>
    <marker id="arrowData" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L12 6.5L1 12Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowDecode" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L12 6.5L1 12Z" fill="#0f766e"/>
    </marker>
    <marker id="arrowBudget" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L12 6.5L1 12Z" fill="#d97706"/>
    </marker>
    <marker id="arrowPressure" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L12 6.5L1 12Z" fill="#e11d48"/>
    </marker>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #111827; letter-spacing: 0; }
      .sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 23px; font-weight: 500; fill: #475569; letter-spacing: 0; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 20px; font-weight: 500; fill: #475569; letter-spacing: 0; }
      .tiny { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #64748b; letter-spacing: 0; }
      .chip { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #1f2937; letter-spacing: 0; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .prefillPanel { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2.2; }
      .decodePanel { fill: #ecfdf5; stroke: #5eead4; stroke-width: 2.2; }
      .pbcPanel { fill: #fff7ed; stroke: #fdba74; stroke-width: 2.2; }
      .inset { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .dataArrow { fill: none; stroke: #2563eb; stroke-width: 7; stroke-linecap: round; marker-end: url(#arrowData); }
      .decodeArrow { fill: none; stroke: #0f766e; stroke-width: 7; stroke-linecap: round; marker-end: url(#arrowDecode); }
      .budgetArrow { fill: none; stroke: #d97706; stroke-width: 5.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBudget); }
      .pressureArrow { fill: none; stroke: #e11d48; stroke-width: 4.8; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 12 10; marker-end: url(#arrowPressure); }
      .dash { fill: none; stroke: #94a3b8; stroke-width: 2.2; stroke-dasharray: 9 8; }
    </style>
  </defs>

  <rect width="1800" height="1000" fill="#ffffff"/>

  <!-- Compact figure label and context inset. -->
  <text class="sub" x="80" y="78">PhaseServe adds runtime pressure-budget control to a prefill/decode-disaggregated serving runtime.</text>

  <g transform="translate(1235 50)">
    <rect class="inset" x="0" y="0" width="485" height="128" rx="14"/>
    <text class="chip" x="26" y="36">Base runtime context</text>
    <text class="small" x="26" y="70">DistServe separates prefill and decode.</text>
    <text class="small" x="26" y="100">PhaseServe controls the remaining runtime pressure.</text>
  </g>

  <!-- Runtime foundation. -->
  <g transform="translate(70 214)">
    <rect x="0" y="0" width="1660" height="410" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text class="tiny" x="24" y="34">Request lifecycle and phase-local schedulers</text>
  </g>

  <!-- Request stream. -->
  <g transform="translate(105 292)">
    <text class="label" x="0" y="0">Requests</text>
    <text class="small" x="0" y="40">known prompt</text>
    <text class="small" x="0" y="70">unknown output</text>
    <g transform="translate(5 118)">
      <circle cx="0" cy="0" r="13" fill="#2563eb"/>
      <rect x="35" y="-10" width="150" height="20" rx="10" fill="#dbeafe"/>
      <circle cx="0" cy="52" r="13" fill="#0f766e"/>
      <rect x="35" y="42" width="112" height="20" rx="10" fill="#ccfbf1"/>
      <circle cx="0" cy="104" r="13" fill="#d97706"/>
      <rect x="35" y="94" width="174" height="20" rx="10" fill="#fed7aa"/>
    </g>
  </g>

  <!-- Prefill. -->
  <g transform="translate(365 250)">
    <rect class="prefillPanel" x="0" y="0" width="365" height="330" rx="22"/>
    <text class="label" x="32" y="50">Prefill workers</text>
    <text class="small" x="32" y="86">BPS under PBC budgets</text>

    <g transform="translate(32 132)">
      <rect x="0" y="0" width="132" height="132" rx="16" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
      <text class="chip" x="22" y="42">Waiting</text>
      <text class="chip" x="22" y="70">prefill</text>
      <rect x="22" y="93" width="88" height="14" rx="7" fill="#93c5fd"/>
      <rect x="22" y="116" width="62" height="14" rx="7" fill="#38bdf8"/>
    </g>

    <g transform="translate(200 124)">
      <rect x="0" y="0" width="132" height="146" rx="18" fill="#ffffff" stroke="#2563eb" stroke-width="2.2"/>
      <rect x="22" y="22" width="72" height="38" rx="19" fill="#2563eb"/>
      <text x="58" y="48" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">BPS</text>
      <text class="chip" x="22" y="88">known cost</text>
      <text class="small" x="22" y="118">oldest progress</text>
    </g>
  </g>

  <!-- Bridge. -->
  <g transform="translate(790 250)">
    <rect class="panel" x="0" y="0" width="270" height="330" rx="22"/>
    <text class="label" x="32" y="50">Bridge</text>
    <text class="small" x="32" y="86">KV handoff</text>
    <text class="small" x="32" y="116">first-decode gate</text>

    <g transform="translate(32 166)">
      <rect x="0" y="0" width="206" height="66" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
      <text class="chip" x="103" y="41" text-anchor="middle">admission boundary</text>
    </g>
    <g transform="translate(54 264)">
      <rect x="0" y="0" width="38" height="30" rx="8" fill="#10b981"/>
      <rect x="52" y="0" width="38" height="30" rx="8" fill="#34d399"/>
      <rect x="104" y="0" width="38" height="30" rx="8" fill="#a7f3d0"/>
      <rect x="156" y="0" width="38" height="30" rx="8" fill="#fde68a"/>
    </g>
  </g>

  <!-- Decode. -->
  <g transform="translate(1120 250)">
    <rect class="decodePanel" x="0" y="0" width="535" height="330" rx="22"/>
    <text class="label" x="32" y="50">Decode workers</text>
    <text class="small" x="32" y="86">KAS selects a feasible active set</text>

    <g transform="translate(32 125)">
      <rect x="0" y="0" width="198" height="146" rx="18" fill="#ffffff" stroke="#0f766e" stroke-width="2.2"/>
      <rect x="22" y="22" width="72" height="38" rx="19" fill="#0f766e"/>
      <text x="58" y="48" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">KAS</text>
      <text class="chip" x="22" y="88">hard gates first</text>
      <text class="small" x="22" y="119">KV / swap / batch</text>
    </g>

    <g transform="translate(265 118)">
      <rect x="0" y="0" width="225" height="160" rx="18" fill="#ffffff" stroke="#99f6e4" stroke-width="2"/>
      <text class="chip" x="22" y="38">Active set</text>
      <text class="small" x="22" y="70">output-tail eligible</text>
      <text class="small" x="22" y="98">first-decode reserved</text>
      <text class="small" x="22" y="126">conditional drain</text>
      <rect x="24" y="137" width="56" height="14" rx="7" fill="#0f766e"/>
      <rect x="94" y="137" width="56" height="14" rx="7" fill="#14b8a6"/>
      <rect x="164" y="137" width="38" height="14" rx="7" fill="#5eead4"/>
    </g>

    <g transform="translate(76 292)">
      <rect x="0" y="0" width="375" height="28" rx="14" fill="#ccfbf1" stroke="#5eead4" stroke-width="1.5"/>
      <rect x="24" y="7" width="48" height="14" rx="5" fill="#0f766e" opacity="0.86"/>
      <rect x="88" y="7" width="48" height="14" rx="5" fill="#0d9488" opacity="0.75"/>
      <rect x="152" y="7" width="48" height="14" rx="5" fill="#14b8a6" opacity="0.72"/>
      <rect x="216" y="7" width="48" height="14" rx="5" fill="#5eead4" opacity="0.78"/>
      <rect x="280" y="7" width="48" height="14" rx="5" fill="#f59e0b" opacity="0.74"/>
      <text class="tiny" x="188" y="58" text-anchor="middle">existing block-manager / KV state</text>
    </g>
  </g>

  <!-- Data path. -->
  <path class="dataArrow" d="M290 415H360"/>
  <path class="dataArrow" d="M695 415H785"/>
  <path class="decodeArrow" d="M1060 415H1115"/>
  <path class="decodeArrow" d="M1655 415H1730"/>
  <text class="tiny" x="1684" y="386">tokens</text>

  <!-- PBC controller. -->
  <g transform="translate(370 690)">
    <rect class="pbcPanel" x="0" y="0" width="1060" height="240" rx="22"/>
    <text class="label" x="34" y="50">PBC: online pressure-budget control</text>
    <text class="small" x="34" y="84">control contract: pressure vector -> regime/conflict owner -> typed budgets</text>

    <g transform="translate(34 122)">
      <text class="chip" x="0" y="0">Pressure signals</text>
      <rect x="0" y="22" width="116" height="36" rx="18" fill="#ffe4e6" stroke="#fb7185"/>
      <text class="chip" x="58" y="46" text-anchor="middle">bridge</text>
      <rect x="128" y="22" width="136" height="36" rx="18" fill="#fef3c7" stroke="#f59e0b"/>
      <text class="chip" x="196" y="46" text-anchor="middle">first token</text>
      <rect x="276" y="22" width="132" height="36" rx="18" fill="#dbeafe" stroke="#60a5fa"/>
      <text class="chip" x="342" y="46" text-anchor="middle">decode q</text>
      <rect x="0" y="72" width="116" height="36" rx="18" fill="#dcfce7" stroke="#22c55e"/>
      <text class="chip" x="58" y="96" text-anchor="middle">KV</text>
      <rect x="128" y="72" width="136" height="36" rx="18" fill="#fee2e2" stroke="#ef4444"/>
      <text class="chip" x="196" y="96" text-anchor="middle">swap</text>
      <rect x="276" y="72" width="132" height="36" rx="18" fill="#ede9fe" stroke="#8b5cf6"/>
      <text class="chip" x="342" y="96" text-anchor="middle">age</text>
    </g>

    <g transform="translate(505 122)">
      <rect x="0" y="8" width="178" height="96" rx="18" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
      <text class="chip" x="89" y="44" text-anchor="middle">regime /</text>
      <text class="chip" x="89" y="72" text-anchor="middle">conflict owner</text>
    </g>

    <g transform="translate(745 122)">
      <text class="chip" x="0" y="0">Typed budgets</text>
      <text class="small" x="0" y="42">prefill injection + block margin</text>
      <text class="small" x="0" y="75">bridge admission</text>
      <text class="small" x="0" y="108">decode scan / swap / intensity</text>
    </g>
  </g>

  <!-- Controller arrows. -->
  <path class="pressureArrow" d="M920 580C912 625 850 650 755 690"/>
  <path class="pressureArrow" d="M1240 580C1226 632 1125 660 942 690"/>
  <path class="pressureArrow" d="M1494 580C1478 660 1320 668 1036 690"/>
  <text class="tiny" x="990" y="650" fill="#e11d48">pressure observations</text>

  <path class="budgetArrow" d="M790 690C755 650 674 615 625 520"/>
  <path class="budgetArrow" d="M1015 690C1010 632 970 600 930 492"/>
  <path class="budgetArrow" d="M1195 690C1225 640 1260 600 1266 520"/>
  <text class="tiny" x="676" y="646" fill="#d97706">prefill budget</text>
  <text class="tiny" x="940" y="626" fill="#d97706">bridge admission</text>
  <text class="tiny" x="1265" y="646" fill="#d97706">decode budget</text>

  <!-- Boundary notes. -->
  <g transform="translate(80 700)">
    <rect class="inset" x="0" y="0" width="235" height="192" rx="16"/>
    <text class="chip" x="24" y="38">Problem inset</text>
    <text class="small" x="24" y="76">one-way handoff</text>
    <text class="small" x="24" y="108">can leave pressure</text>
    <text class="small" x="24" y="140">visible only late</text>
    <path class="dash" d="M38 164H196"/>
    <circle cx="68" cy="164" r="9" fill="#2563eb"/>
    <circle cx="116" cy="164" r="9" fill="#0f766e"/>
    <circle cx="164" cy="164" r="9" fill="#e11d48"/>
  </g>

  <g transform="translate(1480 700)">
    <rect class="inset" x="0" y="0" width="240" height="142" rx="16"/>
    <text class="chip" x="24" y="38">Method boundary</text>
    <text class="small" x="24" y="76">not a global optimizer</text>
    <text class="small" x="24" y="108">hard feasibility first</text>
  </g>

  <!-- Legend. -->
  <g transform="translate(80 940)">
    <path class="dataArrow" d="M0 0H58"/>
    <text class="tiny" x="76" y="7">request / KV handoff path</text>
    <path class="pressureArrow" d="M332 0H390"/>
    <text class="tiny" x="408" y="7">pressure observation</text>
    <path class="budgetArrow" d="M668 0H726"/>
    <text class="tiny" x="744" y="7">budget control</text>
  </g>
</svg>
