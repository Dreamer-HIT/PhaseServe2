<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="760" viewBox="0 0 1800 760" role="img" aria-labelledby="title desc">
  <title id="title">PhaseServe clean paper overview</title>
  <desc id="desc">Clean paper-style PhaseServe overview with no overlapping labels: a compact pressure inset and a runtime architecture with PBC, BPS, bridge admission, and KAS.</desc>
  <defs>
    <marker id="v4ArrowBlack" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L10 5.5L1 10Z" fill="#111827"/>
    </marker>
    <marker id="v4ArrowOrange" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L10 5.5L1 10Z" fill="#c76b00"/>
    </marker>
    <marker id="v4ArrowRed" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L10 5.5L1 10Z" fill="#d21f3c"/>
    </marker>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 25px; font-weight: 700; fill: #111827; letter-spacing: 0; }
      .h { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #111827; letter-spacing: 0; }
      .m { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; letter-spacing: 0; }
      .s { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 500; fill: #334155; letter-spacing: 0; }
      .xs { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 600; fill: #475569; letter-spacing: 0; }
      .panel { fill: #ffffff; stroke: #111827; stroke-width: 1.6; }
      .ctl { fill: #d9e2f3; stroke: #111827; stroke-width: 1.4; }
      .prefill { fill: #fff2cc; stroke: #111827; stroke-width: 1.4; }
      .decode { fill: #ddebf7; stroke: #111827; stroke-width: 1.4; }
      .bridge { fill: #eeeeee; stroke: #111827; stroke-width: 1.4; }
      .inner { fill: #ffffff; stroke: #111827; stroke-width: 1.1; }
      .kv { fill: #e2f0d9; stroke: #111827; stroke-width: 1.0; }
      .warn { fill: #fde8ec; stroke: #d21f3c; stroke-width: 1.3; }
      .path { fill: none; stroke: #111827; stroke-width: 2.2; marker-end: url(#v4ArrowBlack); }
      .budget { fill: none; stroke: #c76b00; stroke-width: 2.4; marker-end: url(#v4ArrowOrange); }
      .pressure { fill: none; stroke: #d21f3c; stroke-width: 2.2; stroke-dasharray: 8 6; marker-end: url(#v4ArrowRed); }
      .line { fill: none; stroke: #64748b; stroke-width: 1.3; }
    </style>
  </defs>

  <rect width="1800" height="760" fill="#ffffff"/>

  <!-- (a) Compact problem inset. -->
  <g transform="translate(60 62)">
    <rect class="panel" x="0" y="0" width="405" height="566"/>
    <text class="title" x="24" y="42">(a) Pressure after split</text>

    <g transform="translate(54 96)">
      <rect class="prefill" x="0" y="0" width="122" height="90"/>
      <text class="m" x="61" y="34" text-anchor="middle">Prefill</text>
      <text class="s" x="61" y="62" text-anchor="middle">FCFS</text>
      <rect x="28" y="72" width="66" height="10" fill="#9dc3e6"/>
    </g>
    <g transform="translate(230 96)">
      <rect class="decode" x="0" y="0" width="122" height="90"/>
      <text class="m" x="61" y="34" text-anchor="middle">Decode</text>
      <text class="s" x="61" y="62" text-anchor="middle">FCFS</text>
      <rect x="28" y="72" width="66" height="10" fill="#70ad47"/>
    </g>
    <path class="path" d="M176 141H224"/>
    <text class="xs" x="200" y="126" text-anchor="middle">KV handoff</text>

    <g transform="translate(48 258)">
      <rect class="warn" x="0" y="0" width="310" height="116"/>
      <text class="m" x="20" y="34">Downstream pressure</text>
      <text class="s" x="20" y="66">bridge / first-token wait</text>
      <text class="s" x="20" y="94">decode backlog / KV / swap</text>
    </g>
    <path class="pressure" d="M292 186V252"/>
    <path class="pressure" d="M115 186C115 222 138 242 165 256"/>

    <g transform="translate(48 430)">
      <text class="m" x="0" y="0">Observation</text>
      <text class="s" x="0" y="34">The phases are separated,</text>
      <text class="s" x="0" y="62">but downstream pressure</text>
      <text class="s" x="0" y="90">still crosses the boundary.</text>
    </g>
  </g>

  <!-- (b) Main architecture. -->
  <g transform="translate(500 62)">
    <rect class="panel" x="0" y="0" width="1240" height="566"/>
    <text class="title" x="24" y="42">(b) PhaseServe architecture</text>

    <!-- PBC control plane. -->
    <g transform="translate(360 76)">
      <rect class="ctl" x="0" y="0" width="520" height="130"/>
      <text class="h" x="24" y="34">PBC</text>
      <text class="m" x="90" y="34">Pressure-budget controller</text>
      <g transform="translate(24 52)">
        <rect class="inner" x="0" y="0" width="145" height="28"/>
        <text class="xs" x="72" y="19" text-anchor="middle">Pressure monitor</text>
        <rect class="inner" x="174" y="0" width="145" height="28"/>
        <text class="xs" x="246" y="19" text-anchor="middle">Regime owner</text>
        <rect class="inner" x="348" y="0" width="145" height="28"/>
        <text class="xs" x="420" y="19" text-anchor="middle">Budget mapper</text>
      </g>
      <text class="xs" x="24" y="98">inputs: bridge / first-token / decode q / KV / swap</text>
      <text class="xs" x="24" y="120">outputs: prefill / bridge-admission / decode budgets</text>
    </g>

    <!-- Requests. -->
    <g transform="translate(40 282)">
      <text class="h" x="0" y="0">Requests</text>
      <text class="s" x="0" y="30">known prompt</text>
      <text class="s" x="0" y="56">unknown output</text>
      <rect x="0" y="90" width="118" height="12" fill="#9dc3e6"/>
      <rect x="0" y="130" width="88" height="12" fill="#70ad47"/>
    </g>

    <!-- Prefill instance. -->
    <g transform="translate(250 226)">
      <rect class="prefill" x="0" y="0" width="250" height="228"/>
      <text class="h" x="18" y="34">Prefill Instance</text>
      <rect class="inner" x="18" y="58" width="214" height="36"/>
      <text class="s" x="125" y="82" text-anchor="middle">Waiting Queue</text>
      <rect class="inner" x="18" y="108" width="94" height="42"/>
      <text class="m" x="65" y="136" text-anchor="middle">BPS</text>
      <rect class="inner" x="126" y="108" width="106" height="42"/>
      <text class="s" x="179" y="128" text-anchor="middle">token/block</text>
      <text class="s" x="179" y="146" text-anchor="middle">gates</text>
      <rect class="kv" x="18" y="166" width="214" height="42"/>
      <text class="s" x="125" y="192" text-anchor="middle">Buckets + protected oldest</text>
    </g>

    <!-- Bridge. -->
    <g transform="translate(565 226)">
      <rect class="bridge" x="0" y="0" width="220" height="228"/>
      <text class="h" x="20" y="34">Bridge</text>
      <rect class="inner" x="20" y="58" width="180" height="42"/>
      <text class="s" x="110" y="84" text-anchor="middle">KV handoff queue</text>
      <rect class="inner" x="20" y="116" width="180" height="42"/>
      <text class="s" x="110" y="142" text-anchor="middle">First-decode admission</text>
      <g transform="translate(30 181)">
        <rect x="0" y="0" width="31" height="22" fill="#00b050"/>
        <rect x="43" y="0" width="31" height="22" fill="#70ad47"/>
        <rect x="86" y="0" width="31" height="22" fill="#a9d18e"/>
        <rect x="129" y="0" width="31" height="22" fill="#d9e2f3"/>
      </g>
    </g>

    <!-- Decode instance. -->
    <g transform="translate(850 226)">
      <rect class="decode" x="0" y="0" width="320" height="228"/>
      <text class="h" x="20" y="34">Decode Instance</text>
      <rect class="inner" x="20" y="58" width="124" height="58"/>
      <text class="m" x="82" y="92" text-anchor="middle">KAS</text>
      <rect class="inner" x="166" y="58" width="132" height="58"/>
      <text class="s" x="232" y="82" text-anchor="middle">Active-set</text>
      <text class="s" x="232" y="104" text-anchor="middle">selection</text>
      <rect class="kv" x="20" y="136" width="278" height="54"/>
      <text class="s" x="159" y="158" text-anchor="middle">Hard gates before utility</text>
      <text class="s" x="159" y="180" text-anchor="middle">KV append / swap / batch</text>
      <rect class="inner" x="20" y="198" width="132" height="20"/>
      <text class="xs" x="86" y="213" text-anchor="middle">tail eligibility</text>
      <rect class="inner" x="166" y="198" width="132" height="20"/>
      <text class="xs" x="232" y="213" text-anchor="middle">conditional drain</text>
    </g>

    <!-- Main request/KV path. -->
    <path class="path" d="M172 354H242"/>
    <path class="path" d="M500 354H558"/>
    <path class="path" d="M785 354H842"/>
    <path class="path" d="M1170 354H1210"/>
    <text class="xs" x="1194" y="332">tokens</text>

    <!-- Pressure observations into PBC: no inline labels, avoid overlap. -->
    <path class="pressure" d="M675 226V212H520V208"/>
    <path class="pressure" d="M1010 226V212H760V208"/>

    <!-- Typed budgets from PBC to each action point. -->
    <path class="budget" d="M460 206V214H375V220"/>
    <path class="budget" d="M620 206V216H675V220"/>
    <path class="budget" d="M830 206V216H1010V220"/>

    <!-- Compact legend, placed away from diagram. -->
    <g transform="translate(40 512)">
      <path class="path" d="M0 0H42"/>
      <text class="xs" x="58" y="5">request/KV path</text>
      <path class="pressure" d="M190 0H232"/>
      <text class="xs" x="248" y="5">pressure</text>
      <path class="budget" d="M355 0H397"/>
      <text class="xs" x="413" y="5">budget</text>
    </g>
  </g>
</svg>
